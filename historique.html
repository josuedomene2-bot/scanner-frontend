<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique des analyses</title>
<style>
  body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: #f7f9fc;
    margin: 0;
    padding: 40px 20px;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  h1 {
    font-size: 24px;
    font-weight: 600;
    padding: 24px 32px;
    margin: 0;
    color: #1e293b;
    border-bottom: 1px solid #e2e8f0;
  }

  .table-wrapper {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
  }

  thead {
    background: #10b981;
  }

  thead th {
    color: white;
    font-weight: 600;
    text-align: left;
    padding: 16px 20px;
    border-right: 1px solid rgba(255,255,255,0.2);
  }

  thead th:last-child {
    border-right: none;
  }

  tbody td {
    padding: 16px 20px;
    border-bottom: 1px solid #e2e8f0;
    border-right: 1px solid #e2e8f0;
    color: #334155;
  }

  tbody td:last-child {
    border-right: none;
  }

  tbody tr:hover {
    background: #f1f5f9;
    transition: 0.2s;
  }

  tbody tr:last-child td {
    border-bottom: none;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #64748b;
    font-size: 16px;
  }

  .btn-delete {
    background: #ef4444;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin: 20px 32px;
    transition: 0.2s;
  }

  .btn-delete:hover {
    background: #dc2626;
    transform: translateY(-1px);
  }

  /* Responsive */
  @media (max-width: 768px) {
    body { padding: 20px 10px; }
    h1 { padding: 20px; font-size: 20px; }
    thead th, tbody td { padding: 12px 14px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>Historique des analyses</h1>
  
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Heure</th>
          <th>Plante</th>
          <th>Résultat</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Exemple de ligne, supprime-les si tu remplis en JS -->
        <tr>
          <td></td>

          <td></td>
        </tr>

        </tr>
        <tr>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
        <tr>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
        <tr>

          <td></td>
          <td></td>
        </tr>
        <tr>
          <td></td>

          <td></td>
          <td></td>
        </tr>
        <tr>
          <td></td>

        <tr>

      </tr>
        <tr>

          <td></td>
        </tr>
        <!-- Si vide, affiche ça : -->
        <!-- <tr><td colspan="4" class="empty-state">Aucun historique pour l'instant</td></tr> -->
      </tbody>
    </table>
  </div>

  <button class="btn-delete" onclick="supprimerHistorique()">Supprimer l'historique</button>
</div>

<script>
function supprimerHistorique() {
  if(confirm("Tu veux vraiment supprimer tout l'historique ?")) {
    document.getElementById('table-body').innerHTML = 
      '<tr><td colspan="4" class="empty-state">Aucun historique pour l\'instant</td></tr>';
  }
}
</script>

</body>
